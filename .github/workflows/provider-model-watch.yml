name: Provider Model Watch

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-model-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync models from providers
        run: npm run models:sync

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(models): sync provider model catalog'
          title: 'chore(models): sync provider model catalog'
          body: |
            Sincronizacion automatica del catalogo de modelos desde proveedores externos.

            Archivos actualizados:
            - src/config/model-catalog.json
            - src/config/model-replacement-preferences.json
            - model-watch-report.json
          branch: chore/provider-model-sync
          delete-branch: true
